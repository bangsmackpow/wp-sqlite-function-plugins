name: Pull Run Logs After Push

on:
  push:
    branches: [ main ]

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fetch run logs (current run)
        run: |
          RUN_ID=${{ github.run_id }}
          LOGS_URL="https://api.github.com/repos/${{ github.repository }}/actions/runs/${RUN_ID}/logs"
          mkdir -p logs
          curl -L \n            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \n            -H "Accept: application/vnd.github+json" \n            -o logs/run-${RUN_ID}.tar.gz "$LOGS_URL"
      - name: Upload run logs as artifact
        uses: actions/upload-artifact@v3
        with:
          name: run-logs-${{ github.run_id }}
          path: logs/run-${{ github.run_id }}.tar.gz
