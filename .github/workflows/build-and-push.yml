name: Build and Push WP SQLite Image

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./docker/wp-sqlite-alpine
          push: true
          tags: |
            ghcr.io/bangsmackpow/wp-sqlite-function-plugins:latest,
            ghcr.io/bangsmackpow/wp-sqlite-function-plugins:${{ github.sha }},
            ghcr.io/bangsmackpow/wp-sqlite-function-plugins:php8.2-alpine
